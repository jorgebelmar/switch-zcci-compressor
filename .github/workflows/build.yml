name: Build Nintendo Switch Homebrew NRO

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install devkitPro Switch Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          sudo wget https://apt.devkitpro.org/devkitpro-keyring.gpg -O /usr/share/keyrings/devkitpro-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/devkitpro-keyring.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y switch-dev switch-sdl2 switch-tools

      - name: Build NRO Binary
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=/opt/devkitpro/devkitA64
          export PATH=$DEVKITPRO/tools/bin:$DEVKITA64/bin:$PATH
          make clean
          make

      - name: Upload NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_to_zcci_compressor
          path: 3ds_to_zcci_compressor.nro

      - name: Create Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 3ds_to_zcci_compressor.nro
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
