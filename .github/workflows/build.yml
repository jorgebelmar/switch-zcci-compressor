name: Build Nintendo Switch Homebrew NRO

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkit-env:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build NRO Binary
        run: |
          make clean
          make

      - name: Upload NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_to_zcci_compressor
          path: 3ds_to_zcci_compressor.nro

      - name: Create Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 3ds_to_zcci_compressor.nro
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
